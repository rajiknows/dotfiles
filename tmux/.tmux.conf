set -g mouse on

bind -n M-Enter send-keys Escape "\r"

# Forward modified Enter (shift+enter, ctrl+enter, etc) through tmux via
# CSI u. Kitty already sends these via its keyboard protocol; without
# `extended-keys on` tmux folds them into a plain CR and apps like Claude
# Code can't tell shift+enter from enter.
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys,xterm-kitty:extkeys'
